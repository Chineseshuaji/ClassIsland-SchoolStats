name: Build & Release Cipx

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build .cipx Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Verify .cipx exists
        shell: pwsh
        run: |
          $cipx = Get-ChildItem -Path . -Filter *.cipx -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cipx) {
            Write-Host "Found: $($cipx.FullName)"
          } else {
            Write-Error "No .cipx file found!"
            Get-ChildItem -Path . -Recurse -Directory | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload .cipx artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland.SchoolStats
          path: |
            **/*.cipx
            cipx/**
          if-no-files-found: error

      - name: Upload full build output (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-debug
          path: |
            bin/Release/
            cipx/
          if-no-files-found: ignore

  release:
    name: Create Pre-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    steps:
      - name: Download .cipx artifact
        uses: actions/download-artifact@v4
        with:
          name: ClassIsland.SchoolStats

      - name: Move .cipx to root
        shell: bash
        run: |
          find . -name "*.cipx" -exec mv {} ./ \;
          ls -la ./*.cipx

      - name: Create Pre-release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.cipx"
          prerelease: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}

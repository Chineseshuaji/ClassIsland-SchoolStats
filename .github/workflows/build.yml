name: Build & Release Cipx

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build .cipx Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Find and Upload .cipx
        shell: pwsh
        run: |
          Write-Host "=== Listing all output files ==="
          Get-ChildItem -Path bin/Release -Recurse | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== Searching for .cipx ==="
          $cipx = Get-ChildItem -Path bin -Filter *.cipx -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cipx) {
            Write-Host "Found cipx: $($cipx.FullName)"
            # Copy to workspace root for easy upload
            Copy-Item $cipx.FullName -Destination ./
            Write-Host "Copied to workspace root"
          } else {
            Write-Host "No .cipx found in bin/, searching entire workspace..."
            Get-ChildItem -Path . -Filter *.cipx -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          }

      - name: Upload .cipx artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland.SchoolStats
          path: |
            bin/**/*.cipx
            *.cipx
          if-no-files-found: error

      - name: Upload full build output (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-debug
          path: bin/Release/net8.0/
          if-no-files-found: ignore

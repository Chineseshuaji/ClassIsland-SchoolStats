name: Build, Test & Release CIPX

on:
  push:
    branches: [main]
    tags: ['*.*.*.*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG
          if ($tag -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "ClassIsland release tags must use exactly four numeric parts without a prefix: a.b.c.d"
          }
          $manifestLine = Select-String -Path manifest.yml -Pattern '^version:\s*(\S+)\s*$'
          if (-not $manifestLine) {
            throw "manifest.yml does not contain a version"
          }
          $manifestVersion = $manifestLine.Matches[0].Groups[1].Value
          if ($manifestVersion -ne $tag) {
            throw "Tag '$tag' does not match manifest version '$manifestVersion'"
          }
          $assemblyVersionLine = Select-String -Path ClassIsland.SchoolStats.csproj -Pattern '<AssemblyVersion>([^<]+)</AssemblyVersion>'
          if (-not $assemblyVersionLine) {
            throw "ClassIsland.SchoolStats.csproj does not contain AssemblyVersion"
          }
          $assemblyVersion = $assemblyVersionLine.Matches[0].Groups[1].Value
          if ($assemblyVersion -ne $tag) {
            throw "Tag '$tag' does not match assembly version '$assemblyVersion'"
          }

      - name: Restore
        run: dotnet restore tests/ClassIsland.SchoolStats.Tests/ClassIsland.SchoolStats.Tests.csproj --locked-mode

      - name: Build
        run: dotnet build tests/ClassIsland.SchoolStats.Tests/ClassIsland.SchoolStats.Tests.csproj -c Release --no-restore -warnaserror

      - name: Test
        run: >-
          dotnet test tests/ClassIsland.SchoolStats.Tests/ClassIsland.SchoolStats.Tests.csproj
          -c Release --no-build --no-restore
          --logger "trx;LogFileName=schoolstats-tests.trx"
          --collect "XPlat Code Coverage"

      - name: Publish CIPX
        run: dotnet publish ClassIsland.SchoolStats.csproj -c Release --no-restore -p:CreateCipx=true

      - name: Verify package output
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem -Path cipx -Filter *.cipx -File -ErrorAction Stop)
          if ($packages.Count -ne 1) {
            throw "Expected exactly one .cipx package in cipx/, found $($packages.Count)"
          }
          if (-not (Test-Path cipx/checksums.md)) {
            throw "The packaging SDK did not generate cipx/checksums.md"
          }
          $checksumText = Get-Content cipx/checksums.md -Raw
          if ($checksumText -notmatch 'CLASSISLAND_PKG_MD5\s+(\{[^\r\n]+\})') {
            throw "checksums.md does not contain CLASSISLAND_PKG_MD5 JSON"
          }
          $checksumMap = $Matches[1] | ConvertFrom-Json -AsHashtable
          $expectedHash = $checksumMap[$packages[0].Name]
          $actualHash = (Get-FileHash $packages[0].FullName -Algorithm MD5).Hash
          if (-not $expectedHash -or $expectedHash -ne $actualHash) {
            throw "CIPX MD5 does not match checksums.md"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($packages[0].FullName)
          try {
            $entries = @($archive.Entries | ForEach-Object FullName)
            if ('manifest.yml' -notin $entries -or 'ClassIsland.SchoolStats.dll' -notin $entries) {
              throw "CIPX is missing manifest.yml or the entrance assembly"
            }
            if ($entries | Where-Object { $_ -match '^(publish|tests)/' }) {
              throw "CIPX contains stale publish/ or tests/ content"
            }
          } finally {
            $archive.Dispose()
          }
          Write-Host "Verified package: $($packages[0].FullName)"

      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClassIsland.SchoolStats
          path: cipx/**
          if-no-files-found: error

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-and-build-diagnostics
          path: |
            **/TestResults/**
            bin/Release/**
            cipx/**
          if-no-files-found: ignore

  release:
    name: Create pre-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ClassIsland.SchoolStats
          path: cipx

      - name: Verify release files
        shell: bash
        run: |
          test "$(find cipx -maxdepth 1 -name '*.cipx' -type f | wc -l)" -eq 1
          test -f cipx/checksums.md

      - name: Create pre-release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "cipx/*.cipx"
          artifactErrorsFailBuild: true
          bodyFile: "cipx/checksums.md"
          prerelease: true
          immutableCreate: true
          generateReleaseNotes: true
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
